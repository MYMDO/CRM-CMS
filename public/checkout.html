<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | Online Store</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <header>
    <div class="container">
      <h1><a href="/">Online Store</a></h1>
      <nav><a href="/cart.html">Cart <span id="cart-count" class="cart-count" style="display:none">0</span></a></nav>
    </div>
  </header>
  <main class="container">
    <h2 style="margin-bottom:1.5rem">Checkout</h2>
    <div class="grid grid-2">
      <div>
        <div class="card" style="margin-bottom:1rem">
          <h3>Shipping Address</h3>
          <div class="form-group"><label>Email</label><input type="email" id="email" required></div>
          <div class="form-group"><label>Full Name</label><input type="text" id="name" required></div>
          <div class="form-group"><label>Address</label><input type="text" id="address" required></div>
          <div class="grid grid-2">
            <div class="form-group"><label>City</label><input type="text" id="city" required></div>
            <div class="form-group"><label>Postal Code</label><input type="text" id="zip" required></div>
          </div>
        </div>
        <button id="checkout-btn" class="btn btn-primary" style="width:100%;padding:0.75rem;font-size:1rem">Pay with Stripe</button>
        <p id="error" class="alert alert-error" style="display:none;margin-top:1rem"></p>
      </div>
      <div>
        <div class="card">
          <h3>Order Summary</h3>
          <div id="summary-items"></div>
          <hr style="margin:1rem 0">
          <div style="display:flex;justify-content:space-between;font-weight:600;font-size:1.1rem">
            <span>Total:</span><span id="total">$0.00</span>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="/js/cart.js"></script>
  <script src="/js/api.js"></script>
  <script>
    let checkoutItems = []
    document.addEventListener('DOMContentLoaded', async () => {
      const stored = sessionStorage.getItem('checkout-items')
      if (!stored) { location.href = '/cart.html'; return }
      checkoutItems = JSON.parse(stored)
      const items = await Promise.all(checkoutItems.map(i => ProductsAPI.get(i.productId).then(p => ({ ...i, product: p }))))
      const valid = items.filter(i => i.product)
      let total = 0
      document.getElementById('summary-items').innerHTML = valid.map(item => {
        const price = item.variantPrice || item.product.price
        total += price * item.quantity
        return `<div style="display:flex;justify-content:space-between;margin:0.5rem 0">
          <span>${item.product.title} x${item.quantity}</span><span>${formatPrice(price * item.quantity, item.product.currency)}</span>
        </div>`
      }).join('')
      document.getElementById('total').textContent = formatPrice(total)
    })

    document.getElementById('checkout-btn').addEventListener('click', async () => {
      const email = document.getElementById('email').value
      const name = document.getElementById('name').value
      if (!email) { showError('Please enter your email'); return }
      const items = checkoutItems.map(i => ({ productId: i.productId, quantity: i.quantity }))
      try {
        const res = await CheckoutAPI.create({ items, customerEmail: email, customerName: name, shippingAddress: {} })
        if (res.orderId) {
          window.location.href = `/order.html?order_id=${res.orderId}&token=${res.token}`
        } else { showError('Checkout failed') }
      } catch (e) { showError(e.message) }
    })

    function showError(msg) { const el = document.getElementById('error'); el.textContent = msg; el.style.display = 'block' }
  </script>
</body>
</html>
