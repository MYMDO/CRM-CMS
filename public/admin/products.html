<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Products | Admin</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <header>
    <div class="container">
      <h1><a href="/admin/">Admin Panel</a></h1>
      <nav>
        <a href="/">View Store</a>
        <a href="/admin/products.html">Products</a>
        <a href="/admin/orders.html">Orders</a>
      </nav>
    </div>
  </header>
  <main class="container">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem">
      <h2>Products</h2>
      <button class="btn btn-primary" onclick="showModal()">Add Product</button>
    </div>
    <div id="products"></div>
  </main>
  <modal id="product-modal">
    <div class="card">
      <span class="close" onclick="hideModal()">&times;</span>
      <h3 id="modal-title">Add Product</h3>
      <form id="product-form" onsubmit="saveProduct(event)">
        <input type="hidden" id="product-id">
        <div class="form-group"><label>Title</label><input id="title" required></div>
        <div class="form-group"><label>Description</label><textarea id="description" rows="3"></textarea></div>
        <div class="grid grid-2">
          <div class="form-group"><label>Price</label><input type="number" id="price" step="0.01" required></div>
          <div class="form-group"><label>Currency</label><input id="currency" value="USD" required></div>
        </div>
        <div class="grid grid-2">
          <div class="form-group"><label>SKU</label><input id="sku"></div>
          <div class="form-group"><label>Category</label><input id="category"></div>
        </div>
        <div class="grid grid-2">
          <div class="form-group"><label>Inventory</label><input type="number" id="inventory" value="0"></div>
          <div class="form-group"><label>Weight (g)</label><input type="number" id="weight" value="0" step="0.1"></div>
        </div>
        <div class="form-group"><label>Image URL</label><input id="image-url" placeholder="https://..."></div>
        <div class="form-group">
          <label>Status</label>
          <select id="status"><option value="active">Active</option><option value="inactive">Inactive</option></select>
        </div>
        <div style="display:flex;gap:0.5rem;margin-top:1rem">
          <button class="btn btn-primary" type="submit">Save</button>
          <button class="btn btn-secondary" type="button" onclick="hideModal()">Cancel</button>
        </div>
      </form>
    </div>
  </modal>
  <script src="/js/api.js"></script>
  <script>
    let products = []
    document.addEventListener('DOMContentLoaded', loadProducts)

    async function loadProducts() {
      products = await ProductsAPI.list()
      renderProducts()
    }

    function renderProducts() {
      document.getElementById('products').innerHTML = products.length ? `
        <table class="table">
          <thead><tr><th>Title</th><th>SKU</th><th>Price</th><th>Stock</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody>${products.map(p => `<tr>
            <td>${p.title}</td><td>${p.sku || '-'}</td>
            <td>${formatPrice(p.price, p.currency)}</td>
            <td>${p.inventory}</td>
            <td><span class="badge badge-${p.status === 'active' ? 'success' : 'warning'}">${p.status}</span></td>
            <td>
              <button class="btn btn-secondary btn-sm" onclick="editProduct('${p.id}')">Edit</button>
              <button class="btn btn-danger btn-sm" onclick="deleteProduct('${p.id}')">Delete</button>
            </td>
          </tr>`).join('')}</tbody>
        </table>` : '<p>No products yet.</p>'
    }

    function showModal(id = null) {
      document.getElementById('product-form').reset()
      document.getElementById('product-id').value = ''
      document.getElementById('modal-title').textContent = 'Add Product'
      if (id) {
        const p = products.find(x => x.id === id)
        if (!p) return
        document.getElementById('modal-title').textContent = 'Edit Product'
        document.getElementById('product-id').value = p.id
        document.getElementById('title').value = p.title
        document.getElementById('description').value = p.description || ''
        document.getElementById('price').value = p.price
        document.getElementById('currency').value = p.currency
        document.getElementById('sku').value = p.sku || ''
        document.getElementById('category').value = p.category || ''
        document.getElementById('inventory').value = p.inventory
        document.getElementById('weight').value = p.weight || 0
        document.getElementById('status').value = p.status
      }
      document.getElementById('product-modal').classList.add('active')
    }

    function hideModal() { document.getElementById('product-modal').classList.remove('active') }

    function editProduct(id) { showModal(id) }

    async function saveProduct(e) {
      e.preventDefault()
      const id = document.getElementById('product-id').value
      const data = {
        title: document.getElementById('title').value,
        description: document.getElementById('description').value,
        price: parseFloat(document.getElementById('price').value),
        currency: document.getElementById('currency').value,
        sku: document.getElementById('sku').value,
        category: document.getElementById('category').value,
        inventory: parseInt(document.getElementById('inventory').value),
        weight: parseFloat(document.getElementById('weight').value),
        status: document.getElementById('status').value,
        images: document.getElementById('image-url').value ? [document.getElementById('image-url').value] : []
      }
      if (id) { await ProductsAPI.update(id, data) } else { await ProductsAPI.create(data) }
      hideModal(); loadProducts()
    }

    async function deleteProduct(id) {
      if (!confirm('Delete this product?')) return
      await ProductsAPI.delete(id); loadProducts()
    }
  </script>
</body>
</html>
